<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | MonoMuseum</title>
    <link rel="stylesheet" href="../static/style.css">
    <script src="../static/script.js" defer></script>
</head>
<body onload="addYear(); loadCheckout();">
    <div class="container">
        <header class="header">
            <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
        </header>

        <nav class="nav_bar">
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="buytickets.html">Buy Tickets</a>
        </nav>

        <main class="main">
            <h1>Checkout</h1>

            <form id="checkoutForm" novalidate>
                <label for="visitDate">Visit Date:</label>
                <input type="date" id="visitDate" required>
                <p class="error" id="visitDateError"></p>

                <label for="ticketType">Ticket Type:</label>
                <select id="ticketType" onchange="calculateTotal()" required>
                    <option value="">Select a ticket type</option>
                    <option value="18">General</option>
                    <option value="18">Student</option>
                    <option value="18">Member</option>
                </select>
                <p class="error" id="ticketTypeError"></p>

                <label for="ticketCount">Ticket Quantity (1–10):</label>
                <input type="number" id="ticketCount" min="1" max="10" step="1" value="1" onchange="calculateTotal()" required>
                <p class="error" id="ticketCountError"></p>

                <label for="email">Email:</label>
                <input type="email" id="email" required>
                <p class="error" id="emailError"></p>

                <label for="zipCode">Zip Code (optional):</label>
                <input type="text" id="zipCode" maxlength="5">
                <p class="error" id="zipCodeError"></p>

                <label class="checkbox-label" for="mailingList">
                    <input type="checkbox" id="mailingList">
                    Join our mailing list
                </label>

                <p id="totalPrice">Total: $18</p>

                <button type="button" onclick="submitOrder()">Place Order</button>
            </form>
        </main>

        <footer class="footer">
            <p id="copyYear">© MonoMuseum. All rights reserved.</p>
            <h6>Hours: Sat and Sun - 8AM to 5 PM -</h6>
            <h6>Location: 5000 Forbes Ave, Pittsburgh, PA 15213</h6>
            <h6>Contact: monomuseum@gmail.com</h6>
        </footer>
    </div>
</body>
</html>
